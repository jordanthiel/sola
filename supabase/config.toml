project_id = "nanny-management"

[api]
enabled = true
# Shifted from default 54321 to avoid conflicts with other local Supabase/apps
port = 55321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
major_version = 15

[studio]
enabled = true
port = 55323

[inbucket]
enabled = true
port = 55324

[analytics]
enabled = true
port = 55327

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Platform JWT verify fails locally with ES256 (CryptoKey vs Uint8Array).
# send-email validates the caller via supabase.auth.getUser() instead.
[functions.send-email]
verify_jwt = false

[functions.gusto-api]
verify_jwt = false

[functions.gusto-webhook]
verify_jwt = false
