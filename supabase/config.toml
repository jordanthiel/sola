project_id = "nanny-management"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Platform JWT verify fails locally with ES256 (CryptoKey vs Uint8Array).
# send-email validates the caller via supabase.auth.getUser() instead.
[functions.send-email]
verify_jwt = false
